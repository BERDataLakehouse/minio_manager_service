[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Markers for test categorization
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    serial: marks tests that must run serially (not in parallel)
    smoke: quick sanity check tests
    management: management API tests
    sharing: sharing API tests
    locking: distributed locking tests
    workspaces: workspace API tests

# Default options
addopts = -v --tb=short -p no:warnings

# Parallel execution is enabled by default with pytest-xdist
# Run with: pytest -n auto
# Run serial tests only: pytest -m serial
# Exclude serial tests: pytest -m "not serial" -n auto

# Logging
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

# Timeout for individual tests (requires pytest-timeout)
timeout = 120

# Environment file (requires pytest-dotenv)
env_files = .env
