services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1
    ports:
      - "9012:9002"
      # MinIO Console is available at http://localhost:9013
      - "9013:9003"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    healthcheck:
      # reference: https://github.com/rodrigobdz/docker-compose-healthchecks?tab=readme-ov-file#minio-release2023-11-01t18-37-25z-and-older
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9002' || exit 1
      interval: 1s
      timeout: 10s
      retries: 5
    # Note there is no bucket by default
    command: server --address 0.0.0.0:9002 --console-address 0.0.0.0:9003 /data

  ceph:
    image: ghcr.io/kbasetest/ceph-rgw-test-image:0.1.3
    environment:
      RGW_PORT: "8080"
      RGW_ACCESS_KEY: test_access_key
      RGW_SECRET_KEY: test_access_secret
    ports:
      - "9050:8080"
      - "8445:8443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  redis:
    image: redis:8.0.1
    ports:
      - "6389:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 5

  minio-manager:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      - MINIO_ENDPOINT=http://minio:9002
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=minio123
      - KBASE_AUTH_URL=https://ci.kbase.us/services/auth/
      - KBASE_ADMIN_ROLES=CDM_JUPYTERHUB_ADMIN
      - KBASE_REQUIRED_ROLES=BERDL_USER
      - REDIS_URL=redis://redis:6379
      - POLARIS_CATALOG_URI=http://polaris:8181/api/catalog
      - POLARIS_CREDENTIAL=root:s3cr3t
      - MMS_DB_HOST=postgres
      - MMS_DB_PORT=5432
      - MMS_DB_NAME=mms
      - MMS_DB_USER=mms
      - MMS_DB_PASSWORD=mmspassword
      - MMS_DB_ENCRYPTION_KEY=change-me-in-prod
    ports:
      - "8010:8000"
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      polaris:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    ports:
      - "5442:5432"
    environment:
      - POSTGRES_DB=polaris
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hivepassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-mms-db.sh:/docker-entrypoint-initdb.d/01-init-mms-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 5s
      timeout: 2s
      retries: 15

  polaris-bootstrap:
    image: apache/polaris-admin-tool:1.3.0-incubating
    environment:
      - POLARIS_PERSISTENCE_TYPE=relational-jdbc
      - QUARKUS_DATASOURCE_DB_KIND=postgresql
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/polaris
      - QUARKUS_DATASOURCE_USERNAME=hive
      - QUARKUS_DATASOURCE_PASSWORD=hivepassword
    entrypoint: ["sh", "-c"]
    command:
      - |
        java -jar /deployments/polaris-admin-tool.jar bootstrap --realm=POLARIS --credential=POLARIS,root,s3cr3t
        rc=$$?
        if [ $$rc -eq 3 ]; then
          echo "Already bootstrapped — skipping (OK)"
          exit 0
        fi
        exit $$rc
    depends_on:
      postgres:
        condition: service_healthy

  polaris:
    image: apache/polaris:1.3.0-incubating
    ports:
      - "8182:8181"
    environment:
      - POLARIS_PERSISTENCE_TYPE=relational-jdbc
      - QUARKUS_DATASOURCE_DB_KIND=postgresql
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres:5432/polaris
      - QUARKUS_DATASOURCE_USERNAME=hive
      - QUARKUS_DATASOURCE_PASSWORD=hivepassword
      - POLARIS_REALM_CONTEXT_REALMS=POLARIS
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=minio123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8182/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      polaris-bootstrap:
        condition: service_completed_successfully

volumes:
  postgres_data:
