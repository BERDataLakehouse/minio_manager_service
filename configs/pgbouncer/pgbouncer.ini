[databases]
mms_rw       = host=postgres         port=5432 dbname=mms
# Read-only: routes to the streaming replica. connect_query forces every
# backend connection to set default_transaction_read_only=on as defense-in-
# depth; the replica also rejects writes at the engine level (hot_standby).
mms_ro       = host=postgres-replica port=5432 dbname=mms connect_query='SET default_transaction_read_only=on'
polaris      = host=postgres         port=5432 dbname=polaris
metastore_db = host=postgres         port=5432 dbname=metastore_db
# Required because auth_dbname=postgres — auth_query lookups land here.
postgres     = host=postgres         port=5432 dbname=postgres

[pgbouncer]
listen_port               = 6432
listen_addr               = 0.0.0.0
auth_type                 = scram-sha-256
auth_user                 = pgbouncer_auth
auth_query                = SELECT * FROM pgbouncer_auth_schema.user_lookup($1)
auth_file                 = /etc/pgbouncer/userlist.txt
auth_dbname               = postgres

pool_mode                 = transaction
max_client_conn           = 2000
default_pool_size         = 20
min_pool_size             = 2
reserve_pool_size         = 5
reserve_pool_timeout      = 3
max_db_connections        = 40
server_idle_timeout       = 600
server_lifetime           = 3600
server_reset_query        = DISCARD ALL

max_prepared_statements   = 200
ignore_startup_parameters = extra_float_digits,options,IntervalStyle
application_name_add_host = 1

admin_users               = pgbouncer_admin
stats_users               = pgbouncer_stats

log_connections           = 1
log_disconnections        = 0
