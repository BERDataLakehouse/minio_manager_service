access-control.name=berdl-namespace-isolation
# No shared catalogs — each user only sees their own u_{username}_* dynamic catalogs.
# The system catalog is intentionally hidden to prevent information leaks
# (system.runtime.queries exposes all users' SQL text).
shared.catalogs=
shared.schemas=information_schema,default
# No unfiltered catalogs — all catalogs apply namespace-based schema filtering.
unfiltered.catalogs=
# Governance API for tenant group resolution (docker-compose service name).
governance.api.url=http://minio-manager:8000
governance.cache.ttl.seconds=300
# Admin path used by the MMS Trino reconciler to issue CREATE/DROP CATALOG
# for tenant catalogs. The same value must be set as TRINO_ADMIN_TOKEN in the
# MMS env (mms-env.yaml ConfigMap or docker-compose env block). For local
# docker-compose use a fixed value; production should rotate per environment.
admin.username=platform_admin
admin.shared-secret=local-dev-trino-admin-token
