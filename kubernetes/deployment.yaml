apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdm-minio-service
  namespace: cdm-jupyterhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdm-minio-service
  template:
    metadata:
      labels:
        app: cdm-minio-service
    spec:
      containers:
        - name: cdm-minio-service
          image: cdm-minio-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cdm-minio-service-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5